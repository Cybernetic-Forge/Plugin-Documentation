name: Publish Wiki.js Content

on:
  push:
    branches:
      - main
    paths:
      - "plugins/**"
      - "wiki-source/**"
      - "scripts/build_wikijs_content.py"
      - ".github/workflows/publish-wikijs-content.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Wiki.js content tree
        run: python scripts/build_wikijs_content.py

      - name: Publish content branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          temp_dir="$(mktemp -d)"
          cp -R wiki-content/. "$temp_dir/"
          cd "$temp_dir"
          git init -b wikijs-content
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Wiki.js content from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:wikijs-content

