name: Deploy Wiki.js

on:
  push:
    branches:
      - main
    paths:
      - "docker-compose.yml"
      - ".env.example"
      - "deploy/**"
      - "ops/**"
      - ".github/workflows/deploy-wikijs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare deploy bundle
        run: |
          set -euo pipefail
          rm -rf deploy-bundle
          mkdir -p deploy-bundle
          cp docker-compose.yml deploy-bundle/
          cp .env.example deploy-bundle/
          cp -R deploy deploy-bundle/
          cp -R ops deploy-bundle/

      - name: Upload bundle
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          scp -P "${{ secrets.DEPLOY_PORT }}" -r deploy-bundle/* "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Write runtime secrets and deploy
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB != '' && secrets.POSTGRES_DB || 'wiki' }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER != '' && secrets.POSTGRES_USER || 'wikijs' }}
          HTTP_PORT: ${{ secrets.HTTP_PORT != '' && secrets.HTTP_PORT || '80' }}
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            mkdir -p '${{ secrets.DEPLOY_PATH }}/data/wiki/ssh' '${{ secrets.DEPLOY_PATH }}/data/postgres'
            printf '%s\n' \
              'POSTGRES_DB=${POSTGRES_DB}' \
              'POSTGRES_USER=${POSTGRES_USER}' \
              'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' \
              'HTTP_PORT=${HTTP_PORT}' \
              > '${{ secrets.DEPLOY_PATH }}/.env'
            printf '%s\n' '${{ secrets.WIKI_CONTENT_SSH_PRIVATE_KEY }}' > '${{ secrets.DEPLOY_PATH }}/data/wiki/ssh/wikijs-content'
            chmod 600 '${{ secrets.DEPLOY_PATH }}/data/wiki/ssh/wikijs-content'
            cd '${{ secrets.DEPLOY_PATH }}'
            docker compose pull
            docker compose up -d --remove-orphans
          "
